configs:
  caddy-file:
    file: ./Caddyfile

networks:
  backend:
  frontend:

secrets:
  service-key:
    file: service/.env.keys
  website-key:
    file: website/.env.keys

services:
  db-init:
    build:
      args:
        - TRANSIT_SYSTEM=wmata
    networks:
      - backend
    volumes:
      - database:/home/data

  cron:
    command:
      [
        "daemon",
        "--docker",
        "--docker-filter=label=com.docker.compose.project=${COMPOSE_PROJECT_NAME}",
      ]
    image: mcuadros/ofelia:0.3.22
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      - service
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  reverse-proxy:
    configs:
      - source: caddy-file
        target: /etc/caddy/Caddyfile
    depends_on:
      - website
    environment:
      - ACME_CA=${ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}
      - DOMAIN=${DOMAIN:-localhost}
    image: caddy:2.11.4
    networks:
      - frontend
    ports:
      - "80:80"
      - "443:443"
      - "433:433/UDP"
    restart: unless-stopped
    volumes:
      - caddy-config:/config
      - caddy-data:/data

  service:
    build: service
    depends_on:
      - db-init
    entrypoint: ["sh", "/home/entrypoint.sh"]
    environment:
      - DATABASE=sqlite://data/db.sqlite?mode=ro
      - RUST_BACKTRACE=1
      - TIMESTAMP=state/timestamp.txt
    labels:
      ofelia.enabled: true
      ofelia.job-exec.wmata.command: "dotenvx run --env-file=/home/.env.prod --env-keys-file=/run/secrets/service-key -- wmata"
      ofelia.job-exec.wmata.schedule: "@every 15m"
    networks:
      - backend
    secrets:
      - service-key
    volumes:
      - database:/home/data:ro
      - service-timestamp:/home/state

  website:
    build: website
    command: ["fire-alarm-website"]
    depends_on:
      - db-init
    entrypoint:
      [
        "dotenvx",
        "run",
        "--env-file=/home/.env.prod",
        "--env-keys-file=/run/secrets/website-key",
        "--",
      ]
    environment:
      - DATABASE=sqlite://data/db.sqlite
      - RUST_BACKTRACE=1
      - URL=0.0.0.0:8080
    expose:
      - 8080
    networks:
      - backend
      - frontend
    restart: unless-stopped
    secrets:
      - website-key
    volumes:
      - database:/home/data

volumes:
  caddy-config:
  caddy-data:
  database:
  service-timestamp:
