services:
  db-init:
    build:
      args:
        - TRANSIT_SYSTEM=wmata
    volumes:
      - database:/home/data:rw

  service:
    build: service
    entrypoint: ["sh", "/home/entrypoint.sh"]
    environment:
      - DATABASE=sqlite://data/db.sqlite?mode=ro
      - TIMESTAMP=state/timestamp.txt
      - RUST_BACKTRACE=1
    env_file:
      - service/.env.keys
    volumes:
      - database:/home/data:ro
      - state:/home/state:rw
    depends_on:
      - db-init
    labels:
      ofelia.enabled: true
      ofelia.job-exec.wmata.schedule: "@every 15m"
      ofelia.job-exec.wmata.command: "dotenvx run -- wmata"

  ofelia:
    image: mcuadros/ofelia:0.4.0-beta.5
    depends_on:
      - service
    command: daemon --docker --docker-filter=label=com.docker.compose.project=${COMPOSE_PROJECT_NAME}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  website:
    build: website
    environment:
      - DATABASE=sqlite://data/db.sqlite
      - URL=0.0.0.0:8080
      - RUST_BACKTRACE=1
    env_file:
      - website/.env.keys
    volumes:
      - database:/home/data:rw
    ports:
      - "127.0.0.1:8080:8080/TCP"
    depends_on:
      - db-init

volumes:
  database:
    name: "Fire-Alarm-WMATA-SQLite"
  state:
    name: "Service-Timestamp"